<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotionArt | Bubbles</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui { position: fixed; z-index: 10; bottom: 40px; left: 40px; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; width: 280px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); }
        button { background: #fff; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 10px; text-transform: uppercase; transition: background 0.2s, color 0.2s; }
        button.active { background: #ff3333; color: #fff; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .text-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .text-row input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 6px; font-size: 12px; outline: none; }
        .text-row input::placeholder { color: rgba(255,255,255,0.3); }
        .text-row input:focus { border-color: rgba(255,255,255,0.5); }
        .text-row button { width: auto; padding: 10px 14px; margin: 0; flex-shrink: 0; }
        #history-bar { display: flex; gap: 3px; margin-bottom: 8px; height: 6px; }
        .history-dot { flex: 1; border-radius: 2px; }
        #status { margin: 5px 0; font-size: 9px; opacity: 0.5; }
        pre { font-family: 'Courier New', monospace; font-size: 10px; color: #00ffcc; margin: 0; white-space: pre-wrap; opacity: 0.9; }
        .nav { position: fixed; top: 30px; right: 30px; z-index: 20; display: flex; gap: 8px; }
        .nav a { color: rgba(255,255,255,0.35); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; transition: all 0.2s; }
        .nav a:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
        .nav a.current { color: #fff; border-color: rgba(255,255,255,0.5); }
        .legend { position: fixed; top: 30px; left: 30px; z-index: 20; display: flex; flex-direction: column; gap: 7px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
        .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="legend" id="legend"></div>

<nav class="nav">
    <a href="/">Waves</a>
    <a href="/bubbles" class="current">Bubbles</a>
    <a href="/zen-pots">Zen Pots</a>
</nav>

<div class="ui">
    <div class="controls">
        <button id="mic-toggle" class="active">Pause Listening</button>
        <div class="text-row">
            <input id="text-input" type="text" placeholder="Or type here...">
            <button id="text-submit">→</button>
        </div>
        <div id="history-bar"></div>
        <p id="status">LISTENING...</p>
        <div style="margin-top:10px;"><pre id="output">Awaiting Neural Data...</pre></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    const EMOTIONS = [
        { key: 'joy',      color: '#ffcc00' },
        { key: 'surprise', color: '#00eeff' },
        { key: 'anger',    color: '#ff3300' },
        { key: 'fear',     color: '#aa00ff' },
        { key: 'sadness',  color: '#0055ff' },
        { key: 'disgust',  color: '#22cc44' },
        { key: 'neutral',  color: '#44aacc' },
    ];
    const EMOTION_COLORS = {};
    EMOTIONS.forEach(e => EMOTION_COLORS[e.key] = e.color);

    // ─── Legend ───────────────────────────────────────────────
    const legendEl = document.getElementById('legend');
    EMOTIONS.forEach(e => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${e.color};box-shadow:0 0 6px ${e.color}"></div>${e.key}`;
        legendEl.appendChild(item);
    });

    // ─── Blob pool ────────────────────────────────────────────
    const blobs = [];

    const GROW_SPEED  = 0.07;
    const HOLD_FRAMES = 180;   // ~3 s at full size
    const FADE_SPEED  = 0.012;
    const RIPPLE_INTERVAL = 35; // frames between ripple rings
    const MAX_ALPHA_SCALE = 1.05; // +40% vs original 0.75

    function spawnBlobs(emotions) {
        const W    = canvas.width  || window.innerWidth;
        const H    = canvas.height || window.innerHeight;
        const diag = Math.sqrt(W * W + H * H);

        emotions.forEach(e => {
            if (e.score < 0.04) return;
            const color = EMOTION_COLORS[e.label];
            if (!color) return;

            blobs.push({
                x: Math.random() * W,
                y: Math.random() * H,
                color,
                score: e.score,
                radius: 0,
                targetRadius: e.score * diag,
                alpha: 0,
                phase: 'grow',
                holdFrames: HOLD_FRAMES,
                rippleTimer: 0,
                ripples: [],   // { r, alpha }
            });
        });
    }

    function updateBlobs() {
        for (let i = blobs.length - 1; i >= 0; i--) {
            const b = blobs[i];
            const maxAlpha = Math.min(1, b.score * MAX_ALPHA_SCALE);

            if (b.phase === 'grow') {
                b.radius += (b.targetRadius - b.radius) * GROW_SPEED;
                b.alpha   = Math.min(maxAlpha, b.alpha + 0.04);
                if (b.radius >= b.targetRadius * 0.97) b.phase = 'hold';

            } else if (b.phase === 'hold') {
                b.holdFrames--;
                if (b.holdFrames <= 0) b.phase = 'fade';

                // Emit a ripple ring every N frames
                b.rippleTimer++;
                if (b.rippleTimer >= RIPPLE_INTERVAL) {
                    b.rippleTimer = 0;
                    b.ripples.push({ r: b.radius * 0.85, alpha: maxAlpha * 0.8 });
                }
            } else {
                b.alpha -= FADE_SPEED;
                if (b.alpha <= 0) { blobs.splice(i, 1); continue; }
            }

            // Advance ripple rings
            for (let j = b.ripples.length - 1; j >= 0; j--) {
                const rp = b.ripples[j];
                rp.r     += 4;
                rp.alpha -= 0.013;
                if (rp.alpha <= 0) b.ripples.splice(j, 1);
            }
        }
    }

    function drawBlobs() {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        blobs.forEach(b => {
            // Main radial gradient blob — increased opacity stops
            const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
            grad.addColorStop(0,    hexAlpha(b.color, b.alpha));
            grad.addColorStop(0.45, hexAlpha(b.color, b.alpha * 0.85));
            grad.addColorStop(0.8,  hexAlpha(b.color, b.alpha * 0.35));
            grad.addColorStop(1,    'transparent');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fill();

            // Ripple rings
            b.ripples.forEach(rp => {
                ctx.save();
                ctx.globalAlpha = rp.alpha;
                ctx.strokeStyle = b.color;
                ctx.lineWidth   = 2;
                ctx.shadowBlur  = 12;
                ctx.shadowColor = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, rp.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            });
        });

        ctx.restore();
    }

    // ─── Emotion History ──────────────────────────────────────
    const HISTORY_SIZE = 8;
    const emotionHistory = [];

    function pushHistory(emotions) {
        const entry = {};
        EMOTIONS.forEach(e => entry[e.key] = 0);
        emotions.forEach(e => { if (entry.hasOwnProperty(e.label)) entry[e.label] = e.score; });
        emotionHistory.push(entry);
        if (emotionHistory.length > HISTORY_SIZE) emotionHistory.shift();
        renderHistoryBar();
    }

    function renderHistoryBar() {
        const bar = document.getElementById('history-bar');
        bar.innerHTML = '';
        emotionHistory.forEach(entry => {
            const dominant = Object.entries(entry).sort((a, b) => b[1] - a[1])[0];
            const dot = document.createElement('div');
            dot.className = 'history-dot';
            dot.style.background = EMOTION_COLORS[dominant[0]] || '#fff';
            bar.appendChild(dot);
        });
    }

    // ─── Draw Loop ────────────────────────────────────────────
    function draw() {
        const W = canvas.width  = window.innerWidth;
        const H = canvas.height = window.innerHeight;

        ctx.clearRect(0, 0, W, H);

        updateBlobs();
        drawBlobs();

        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // ─── Hex → rgba helper ────────────────────────────────────
    function hexAlpha(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${Math.max(0, alpha)})`;
    }

    // ─── Analyse Handler ──────────────────────────────────────
    async function analyseText(text) {
        document.getElementById('status').textContent = 'ANALYSING...';
        try {
            const res = await fetch('/analyse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            const payload = await res.json();
            spawnBlobs(payload.emotions);
            pushHistory(payload.emotions);
            document.getElementById('output').textContent =
                payload.emotions.slice(0, 5).map(e =>
                    `${e.label.toUpperCase()}: ${Math.round(e.score * 100)}%`
                ).join('\n');
            document.getElementById('status').textContent =
                isListening ? 'LISTENING...' : 'READY';
        } catch (err) {
            console.error(err);
            document.getElementById('status').textContent = 'ERROR';
        }
    }

    // ─── Continuous Speech Recognition ────────────────────────
    const button = document.getElementById('mic-toggle');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let isListening = false;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.interimResults = false;

        recognition.addEventListener('result', async (event) => {
            await analyseText(event.results[0][0].transcript);
        });

        recognition.addEventListener('end', () => {
            if (isListening) recognition.start();
        });

        recognition.addEventListener('error', (e) => {
            if (e.error !== 'no-speech') {
                isListening = false;
                button.textContent = 'Resume Listening';
                button.classList.remove('active');
                document.getElementById('status').textContent = 'MIC ERROR';
            }
        });

        button.addEventListener('click', () => {
            if (isListening) {
                isListening = false;
                recognition.stop();
                button.textContent = 'Resume Listening';
                button.classList.remove('active');
                document.getElementById('status').textContent = 'PAUSED';
            } else {
                isListening = true;
                recognition.start();
                button.textContent = 'Pause Listening';
                button.classList.add('active');
                document.getElementById('status').textContent = 'LISTENING...';
            }
        });

        // Auto-start
        isListening = true;
        recognition.start();
    } else {
        button.textContent = 'No Mic API';
        button.disabled = true;
        document.getElementById('status').textContent = 'MIC UNAVAILABLE';
    }

    // ─── Text Input ───────────────────────────────────────────
    const textInput  = document.getElementById('text-input');
    const textSubmit = document.getElementById('text-submit');

    async function submitText() {
        const text = textInput.value.trim();
        if (!text) return;
        textInput.value = '';
        await analyseText(text);
    }

    textSubmit.addEventListener('click', submitText);
    textInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });
</script>
</body>
</html>
