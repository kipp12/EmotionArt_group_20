<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotionArt | Bubbles</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/base.css') }}">
</head>
<body>
    <div class="app-shell">
        {% set themes_active = false %}
        {% set gallery_active = false %}
        {% set favourites_active = false %}
        {% set settings_active = false %}
        {% include '_sidebar.html' %}

        <main class="app-main">
            <header class="page-header">
                <div>
                    <h2 class="page-title">Bubbles</h2>
                    <p class="page-credit">Crafted by Matteo Goldsmith</p>
                </div>
            </header>

            <section class="page-content stage-layout">
                <div class="visual-stage bubbles-stage-frame">
                    <iframe
                        id="bubbles-stage-frame"
                        class="visual-embed"
                        src="/bubbles-original?embed=1"
                        title="Bubbles visual stage"
                    ></iframe>
                </div>

                <div class="overlay-panel">
                    <div class="control-dock">
                        <div class="control-grid no-mode">
                            <button id="mic-toggle" type="button" class="brutal-button passive">START LISTENING</button>
                            <div class="text-input-wrap">
                                <input id="text-input" class="text-input" type="text" placeholder="Type a thought, feeling, or memory...">
                            </div>
                            <button id="text-submit" class="text-submit" type="button">Generate</button>
                        </div>
                        <div class="readout-grid">
                            <div class="readout-cell alt">
                                <p class="meta-label">Status</p>
                                <p id="recording-status" class="status-text">Ready</p>
                            </div>
                            <div class="readout-cell">
                                <p class="meta-label">Emotion scores</p>
                                <div id="classification-output" class="score-list">Waiting for input...</div>
                            </div>
                            <div class="readout-cell alt">
                                <p class="meta-label">Transcript</p>
                                <pre id="transcript">Waiting for speech or text...</pre>
                            </div>
                            <div class="readout-cell save-cell">
                                <button id="save-output" class="brutal-button passive save-button" type="button" disabled>Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='javascript/gallery-save.js') }}"></script>
    <script>
        const stageFrame = document.getElementById('bubbles-stage-frame');
        const saveButton = document.getElementById('save-output');

        let lastEmotions = [];
        let lastTranscriptText = '';
        let isListening = false;
        let recognition = null;
        let committedTranscript = '';
        let liveTranscript = '';
        let shouldAnalyseOnStop = false;

        function getAppSettings() {
            return window.getEmotionArtSettings ? window.getEmotionArtSettings() : {
                audio_default_mic: 'manual',
                audio_transcript_persistence: 'keep',
            };
        }

        function getStageApi() {
            try {
                return stageFrame?.contentWindow?.BubblesStage || null;
            } catch {
                return null;
            }
        }

        function updateTranscript(text) {
            const transcript = document.getElementById('transcript');
            if (!transcript) return;
            transcript.textContent = text || 'Waiting for speech or text...';
        }

        function renderEmotionScores(emotions) {
            const output = document.getElementById('classification-output');
            if (!output) return;
            output.innerHTML = emotions.slice(0, 5).map(emotion => `
                <div class="score-row">
                    <span class="score-label">${emotion.label.toUpperCase()}</span>
                    <span class="score-value">${Math.round(emotion.score * 100)}%</span>
                </div>
            `).join('');
        }

        async function analyseText(text) {
            document.getElementById('recording-status').textContent = 'Analysing';
            lastTranscriptText = text;
            updateTranscript(text);

            try {
                const response = await fetch('/analyse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, model: getAppSettings().model_classifier || 'base' }),
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.details || payload.error || 'Analyse request failed');
                }

                lastEmotions = payload.emotions;
                renderEmotionScores(payload.emotions);
                getStageApi()?.applyEmotions(payload.emotions);

                document.getElementById('recording-status').textContent = isListening ? 'Listening' : 'Ready';
                if (saveButton) saveButton.disabled = false;

                if (getAppSettings().audio_transcript_persistence === 'clear') {
                    updateTranscript('');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('classification-output').textContent = error.message || 'Analysis failed.';
                document.getElementById('recording-status').textContent = 'Model error';
            }
        }

        const button = document.getElementById('mic-toggle');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.addEventListener('result', event => {
                const finalChunks = [];
                const interimChunks = [];

                for (let index = 0; index < event.results.length; index += 1) {
                    const result = event.results[index];
                    const text = result[0].transcript.trim();
                    if (!text) continue;

                    if (result.isFinal) {
                        finalChunks.push(text);
                    } else {
                        interimChunks.push(text);
                    }
                }

                committedTranscript = finalChunks.join(' ').trim();
                liveTranscript = `${committedTranscript} ${interimChunks.join(' ').trim()}`.trim();
                updateTranscript(liveTranscript);
            });

            recognition.addEventListener('end', () => {
                if (isListening) {
                    recognition.start();
                    return;
                }

                if (shouldAnalyseOnStop) {
                    shouldAnalyseOnStop = false;
                    const finalTranscript = (liveTranscript || committedTranscript).trim();
                    committedTranscript = '';
                    liveTranscript = '';
                    updateTranscript(finalTranscript);

                    if (finalTranscript) {
                        analyseText(finalTranscript);
                    } else {
                        document.getElementById('recording-status').textContent = 'Ready';
                    }
                }
            });

            recognition.addEventListener('error', event => {
                if (event.error !== 'no-speech') {
                    isListening = false;
                    button.textContent = 'START LISTENING';
                    button.classList.remove('secondary');
                    button.classList.add('passive');
                    document.getElementById('recording-status').textContent = 'Mic error';
                }
            });

            button.addEventListener('click', () => {
                if (isListening) {
                    isListening = false;
                    shouldAnalyseOnStop = true;
                    recognition.stop();
                    button.textContent = 'START LISTENING';
                    button.classList.remove('secondary');
                    button.classList.add('passive');
                    document.getElementById('recording-status').textContent = 'Analysing';
                } else {
                    committedTranscript = '';
                    liveTranscript = '';
                    shouldAnalyseOnStop = false;
                    isListening = true;
                    updateTranscript('');
                    button.textContent = 'END LISTENING';
                    button.classList.remove('passive');
                    button.classList.add('secondary');
                    document.getElementById('recording-status').textContent = 'Listening';
                    recognition.start();
                }
            });

            button.textContent = 'START LISTENING';
            button.classList.add('passive');
            document.getElementById('recording-status').textContent = 'Ready';
            if (getAppSettings().audio_default_mic === 'auto') {
                button.click();
            }
        } else {
            button.textContent = 'NO MIC API';
            button.disabled = true;
            button.classList.add('passive');
            document.getElementById('recording-status').textContent = 'Mic unavailable';
        }

        const textInput = document.getElementById('text-input');
        const textSubmit = document.getElementById('text-submit');

        async function submitText() {
            const text = textInput.value.trim();
            if (!text) return;
            textInput.value = '';
            await analyseText(text);
        }

        textSubmit.addEventListener('click', submitText);
        textInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') submitText();
        });

        if (window.saveArtwork) {
            window.saveArtwork({
                pageName: 'bubbles',
                captureImage: () => {
                    const stageApi = getStageApi();
                    if (!stageApi || typeof stageApi.captureImage !== 'function') {
                        throw new Error('Bubbles stage is still loading.');
                    }
                    return stageApi.captureImage();
                },
                getEmotions: () => lastEmotions,
                getTranscript: () => lastTranscriptText,
            });
        }
    </script>
</body>
</html>
